<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Wave Player</title>
    <style>
        /* Reset ساده */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

        body {
            background: linear-gradient(to bottom, #1e3c72, #2a5298); /* گرادینت آبی زیبا */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .button {
            background-color: #00c6ff;
            color: #1e3c72;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .button:hover {
            background-color: #0072ff;
            color: white;
            transform: scale(1.1);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <h1>Blue Wave Player</h1>
    <p>پخش‌کننده موسیقی و صدا با تجربه‌ای آرامش‌بخش و ساده.</p>
    <a href="#" class="button">شروع کن</a>

    <footer>© 2025 Blue Wave Player</footer>
</body>
</html>
